<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

.container{
    width:600px;
    margin:auto;
    background:white;
}

.header{
    background:#007bff;
    color:white;
    text-align:center;
    padding:20px;
}

.content{
    padding:30px;
}

.button{
    display:inline-block;
    background:#28a745;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:5px;
}

.footer{
    background:#f1f1f1;
    text-align:center;
    padding:15px;
}

</style>

</head>

<body>

<div class="container">

    <div class="header">

        <h1>📧 Mailbox</h1>

    </div>

    <div class="content">

        <h2>Hello {{ name }},</h2>

        <p>
            {{ message }}
        </p>

        <br>

        <a href="https://yourwebsite.com"
           class="button">

           Visit Website

        </a>

    </div>

    <div class="footer">

        © 2026 Mailbox System

    </div>

</div>

</body>
</html>
